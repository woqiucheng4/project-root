# Postgres + Redis，供自动编程工作流与队列使用
# 启动: docker compose -f docker-compose.workflow.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: autonomous_loop
    ports:
      - "5432:5432"
    volumes:
      - pg_workflow_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  pg_workflow_data:
