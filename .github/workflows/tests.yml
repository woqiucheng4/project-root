name: CI/CD Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    name: Unit & E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Setup Prisma Client
        run: pnpm -F @repo/database db:generate

      - name: Run Unit & Integration Tests (Vitest)
        run: pnpm -r run test

      - name: Install Playwright Browsers
        run: cd apps/web && pnpm dlx playwright install --with-deps

      - name: Run E2E Tests (Playwright)
        run: pnpm -F web run test:e2e
